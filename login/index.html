<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Secure Access | sambit.page</title>
  <meta name="description" content="Secure login to sambit.page tools and dashboard."/>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#030303;--card:#090909;--muted:#0f0f0f;--border:#1c1c1c;
      --fg:#f0f0f0;--fg-dim:#888;--fg-muted:#444;
      --green:#4ade80;--green-glow:rgba(74,222,128,.12);
      --red:#f87171;--red-glow:rgba(248,113,113,.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'JetBrains Mono',monospace;
      background:var(--bg);color:var(--fg);
      -webkit-font-smoothing:antialiased;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;overflow:hidden;position:relative;
    }

    /* ── Matrix canvas ── */
    #matrix-bg{position:fixed;inset:0;opacity:.12;z-index:0;pointer-events:none}

    /* ── Scanline overlay ── */
    body::after{
      content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
      background:repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.08) 2px,
        rgba(0,0,0,.08) 4px
      );
    }

    /* ── Login card ── */
    .login-wrap{position:relative;z-index:10;width:100%;max-width:420px;padding:1rem}

    .login-card{
      background:rgba(9,9,9,.92);
      border:1px solid var(--border);
      backdrop-filter:blur(20px);
      padding:2.5rem 2rem;
      position:relative;
      overflow:hidden;
    }
    /* top green accent line */
    .login-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--green),transparent 70%);
    }

    /* ── Header ── */
    .login-header{text-align:center;margin-bottom:2rem}
    .login-brand{
      font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--green);margin-bottom:1.2rem;
      display:flex;align-items:center;justify-content:center;gap:.6rem;
    }
    .login-brand::before,.login-brand::after{
      content:'';flex:1;max-width:40px;height:1px;
      background:var(--green);opacity:.35;
    }
    .login-title{font-size:1.4rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.4rem}
    .login-sub{font-size:.7rem;color:var(--fg-dim);letter-spacing:.04em}

    /* ── Terminal prompt cursor ── */
    .blink{display:inline-block;width:8px;height:1em;background:var(--green);vertical-align:middle;animation:blink 1s step-end infinite;margin-left:2px}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* ── Tab toggle ── */
    .tab-row{display:flex;border:1px solid var(--border);margin-bottom:1.8rem}
    .tab-btn{
      flex:1;padding:.55rem;font-family:inherit;font-size:.68rem;
      letter-spacing:.1em;text-transform:uppercase;background:transparent;
      color:var(--fg-dim);border:none;cursor:pointer;transition:background .2s,color .2s;
    }
    .tab-btn.active{background:var(--green-glow);color:var(--green)}
    .tab-btn:first-child{border-right:1px solid var(--border)}

    /* ── Form inputs ── */
    .field{margin-bottom:1.1rem}
    .field-label{
      font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
      color:var(--fg-muted);margin-bottom:.4rem;display:block;
    }
    .input-wrap{display:flex;align-items:center;border:1px solid var(--border);background:var(--muted);transition:border-color .2s}
    .input-wrap:focus-within{border-color:rgba(74,222,128,.4)}
    .input-prompt{padding:0 .7rem;color:var(--green);font-size:.8rem;flex-shrink:0;opacity:.7}
    .field input{
      flex:1;background:transparent;border:none;outline:none;
      font-family:inherit;font-size:.8rem;color:var(--fg);
      padding:.65rem .5rem .65rem 0;
    }
    .field input::placeholder{color:var(--fg-muted)}

    /* ── Submit button ── */
    .btn-submit{
      width:100%;padding:.75rem;
      background:var(--green);color:#000;
      font-family:inherit;font-size:.78rem;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;
      border:none;cursor:pointer;
      transition:opacity .2s,transform .15s;
      margin-top:.4rem;
    }
    .btn-submit:hover{opacity:.88;transform:translateY(-1px)}
    .btn-submit:active{transform:translateY(0)}
    .btn-submit:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* ── Divider ── */
    .or-divider{
      display:flex;align-items:center;gap:.8rem;
      margin:1.4rem 0;font-size:.62rem;
      letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);
    }
    .or-divider::before,.or-divider::after{
      content:'';flex:1;height:1px;background:var(--border);
    }

    /* ── Social buttons ── */
    .social-btns{display:flex;flex-direction:column;gap:.65rem}
    .btn-social{
      display:flex;align-items:center;justify-content:center;gap:.75rem;
      padding:.65rem 1rem;background:var(--muted);
      border:1px solid var(--border);color:var(--fg-dim);
      font-family:inherit;font-size:.72rem;letter-spacing:.06em;
      cursor:pointer;transition:background .2s,border-color .2s,color .2s;
      text-decoration:none;width:100%;
    }
    .btn-social:hover{background:#111;border-color:var(--fg-muted);color:var(--fg)}
    .btn-social svg{width:17px;height:17px;flex-shrink:0}
    .btn-google svg{fill:#fff}
    .btn-github svg{fill:#fff}

    /* ── Error / success messages ── */
    .msg{
      padding:.65rem .8rem;margin-bottom:1rem;
      font-size:.72rem;letter-spacing:.04em;line-height:1.5;
      border-left:2px solid;display:none;
    }
    .msg.error{background:var(--red-glow);border-color:var(--red);color:var(--red)}
    .msg.success{background:var(--green-glow);border-color:var(--green);color:var(--green)}
    .msg.show{display:block}

    /* ── Footer link ── */
    .login-footer{text-align:center;margin-top:1.8rem;font-size:.65rem;color:var(--fg-muted)}
    .login-footer a{color:var(--green);transition:opacity .2s}
    .login-footer a:hover{opacity:.7}

    /* ── Loading spinner ── */
    .spinner{
      display:none;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);
      border-top-color:#000;border-radius:50%;
      animation:spin .7s linear infinite;margin-left:.5rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Responsive ── */
    @media(max-width:480px){
      .login-card{padding:2rem 1.3rem}
    }
  </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="login-wrap">
  <div class="login-card" id="login-card">

    <div class="login-header">
      <div class="login-brand">sambit.page<span class="blink"></span></div>
      <h1 class="login-title">Secure Access</h1>
      <p class="login-sub" id="login-sub-text">// authenticate to continue</p>
    </div>

    <!-- Sign In / Sign Up tabs -->
    <div class="tab-row">
      <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Status message -->
    <div class="msg" id="msg"></div>

    <!-- Email / Password form -->
    <form id="email-form" onsubmit="handleEmailAuth(event)" autocomplete="on">
      <div class="field">
        <label class="field-label" for="email-input">Email</label>
        <div class="input-wrap">
          <span class="input-prompt">›</span>
          <input type="email" id="email-input" placeholder="you@example.com" required autocomplete="email"/>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="pass-input">Password</label>
        <div class="input-wrap">
          <span class="input-prompt">›</span>
          <input type="password" id="pass-input" placeholder="••••••••" required autocomplete="current-password" minlength="6"/>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">
        <span id="submit-label">Sign In</span>
        <span class="spinner" id="spinner"></span>
      </button>
    </form>

    <div class="or-divider">or continue with</div>

    <!-- Social sign-in -->
    <div class="social-btns">
      <button class="btn-social btn-google" id="btn-google" onclick="signInGoogle()">
        <!-- Google logo -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <button class="btn-social btn-github" id="btn-github" onclick="signInGitHub()">
        <!-- GitHub logo -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        Sign in with GitHub
      </button>
    </div>

    <div class="login-footer">
      <a href="/">← back to sambit.page</a>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     FIREBASE CONFIG
     ─────────────────────────────────────────────────────────────
     HOW TO FIND YOUR CONFIG:
     1. Go to https://console.firebase.google.com
     2. Select your project
     3. Click the ⚙ gear icon → "Project settings"
     4. Scroll to "Your apps" → click your Web app (</>)
     5. Copy each value from the firebaseConfig object shown
     ══════════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    GoogleAuthProvider,
    GithubAuthProvider,
    signInWithPopup,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  // ─── REPLACE THESE WITH YOUR REAL VALUES ───────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyAvwVd19ucMaKp_WsYDSVU0hzu5asHhS1k",
    authDomain:        "sambit-portfolio.firebaseapp.com",
    projectId:         "sambit-portfolio",
    storageBucket:     "sambit-portfolio.firebasestorage.app",
    messagingSenderId: "98909249081",
    appId:             "1:98909249081:web:00bdbda2f0ed56a2c177e8"
  };
  // ────────────────────────────────────────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ── Redirect if already logged in ──────────────────────────────
  onAuthStateChanged(auth, user => {
    if (user) redirectAfterLogin();
  });

  // ── Helpers ────────────────────────────────────────────────────
  function redirectAfterLogin() {
    // Change this to whatever page you want after login
    window.location.href = '/resume-builder/';
  }

  function showMsg(text, type = 'error') {
    const el = document.getElementById('msg');
    el.textContent = '// ' + text;
    el.className   = 'msg ' + type + ' show';
  }
  function clearMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
  }

  function setLoading(on) {
    document.getElementById('submit-btn').disabled = on;
    document.getElementById('spinner').style.display = on ? 'inline-block' : 'none';
    document.getElementById('btn-google').disabled = on;
    document.getElementById('btn-github').disabled = on;
  }

  function friendlyError(code) {
    const map = {
      'auth/invalid-email':           'Invalid email address.',
      'auth/user-not-found':          'No account found with that email.',
      'auth/wrong-password':          'Incorrect password.',
      'auth/email-already-in-use':    'An account with that email already exists.',
      'auth/weak-password':           'Password must be at least 6 characters.',
      'auth/popup-closed-by-user':    'Sign-in popup was closed.',
      'auth/cancelled-popup-request': 'Only one sign-in popup allowed at a time.',
      'auth/account-exists-with-different-credential': 'Account already exists. Try a different sign-in method.',
    };
    return map[code] || 'Something went wrong. Try again.';
  }

  // ── Email / Password ───────────────────────────────────────────
  window.handleEmailAuth = async function(e) {
    e.preventDefault();
    clearMsg();
    const email    = document.getElementById('email-input').value.trim();
    const password = document.getElementById('pass-input').value;
    const isSignUp = document.getElementById('tab-signup').classList.contains('active');

    setLoading(true);
    try {
      if (isSignUp) {
        await createUserWithEmailAndPassword(auth, email, password);
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
      showMsg('Access granted. Redirecting…', 'success');
      setTimeout(redirectAfterLogin, 900);
    } catch (err) {
      showMsg(friendlyError(err.code));
    } finally {
      setLoading(false);
    }
  };

  // ── Google ─────────────────────────────────────────────────────
  window.signInGoogle = async function() {
    clearMsg();
    setLoading(true);
    try {
      const provider = new GoogleAuthProvider();
      await signInWithPopup(auth, provider);
      showMsg('Access granted. Redirecting…', 'success');
      setTimeout(redirectAfterLogin, 900);
    } catch (err) {
      showMsg(friendlyError(err.code));
    } finally {
      setLoading(false);
    }
  };

  // ── GitHub ─────────────────────────────────────────────────────
  window.signInGitHub = async function() {
    clearMsg();
    setLoading(true);
    try {
      const provider = new GithubAuthProvider();
      provider.addScope('read:user');
      await signInWithPopup(auth, provider);
      showMsg('Access granted. Redirecting…', 'success');
      setTimeout(redirectAfterLogin, 900);
    } catch (err) {
      showMsg(friendlyError(err.code));
    } finally {
      setLoading(false);
    }
  };

  // ── Tab switch ─────────────────────────────────────────────────
  window.switchTab = function(tab) {
    const isSignUp = tab === 'signup';
    document.getElementById('tab-signin').classList.toggle('active', !isSignUp);
    document.getElementById('tab-signup').classList.toggle('active',  isSignUp);
    document.getElementById('submit-label').textContent = isSignUp ? 'Create Account' : 'Sign In';
    document.getElementById('login-sub-text').textContent = isSignUp
      ? '// create your account'
      : '// authenticate to continue';
    document.getElementById('pass-input').autocomplete = isSignUp ? 'new-password' : 'current-password';
    clearMsg();
  };
</script>

<!-- Matrix rain background -->
<script>
  const cvs = document.getElementById('matrix-bg');
  const ctx  = cvs.getContext('2d');
  function resize(){ cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*<>/\\|{}[]';
  const SZ = 13;
  let drops = [];
  function initDrops(){ drops = Array(Math.floor(cvs.width/SZ)).fill(0); }
  initDrops();
  window.addEventListener('resize', initDrops);
  setInterval(() => {
    ctx.fillStyle = 'rgba(3,3,3,0.05)';
    ctx.fillRect(0,0,cvs.width,cvs.height);
    ctx.fillStyle = '#4ade80';
    ctx.font = SZ + 'px JetBrains Mono';
    drops.forEach((y,i) => {
      ctx.fillText(CHARS[Math.floor(Math.random()*CHARS.length)], i*SZ, y*SZ);
      if(y*SZ > cvs.height && Math.random() > .97) drops[i]=0;
      else drops[i]++;
    });
  }, 55);
</script>

</body>
</html>
