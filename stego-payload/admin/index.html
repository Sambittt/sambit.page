<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Stego Admin | sambit.page</title>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#030303;--card:#080808;--muted:#0f0f0f;--border:#1c1c1c;--fg:#f0f0f0;--dim:#888;--fmuted:#444;--green:#4ade80;--red:#f87171;--yellow:#facc15;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased}
nav{border-bottom:1px solid var(--border);background:rgba(3,3,3,.95);padding:.65rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{font-size:.85rem;font-weight:700;color:var(--red);letter-spacing:.06em}
.nav-r{display:flex;align-items:center;gap:.8rem}
.nav-user{font-size:.65rem;color:var(--dim)}
.nav-out{font-size:.65rem;letter-spacing:.1em;padding:.3rem .7rem;border:1px solid var(--border);color:var(--dim);background:transparent;font-family:inherit;cursor:pointer;transition:border-color .2s,color .2s}
.nav-out:hover{border-color:var(--red);color:var(--red)}
main{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1rem;font-weight:700;color:var(--red);margin-bottom:1.5rem;letter-spacing:.06em}
/* STATS */
.stats{display:flex;gap:1px;border:1px solid var(--border);margin-bottom:2rem;flex-wrap:wrap}
.stat{flex:1;min-width:120px;background:var(--card);padding:1rem;text-align:center}
.stat-n{font-size:1.8rem;font-weight:700;color:var(--red)}
.stat-l{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--fmuted);margin-top:.2rem}
/* TABLE */
.sec-label{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:.6rem}
.table-wrap{border:1px solid var(--border);overflow-x:auto;margin-bottom:2rem}
table{width:100%;border-collapse:collapse}
th{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--fmuted);padding:.7rem .9rem;text-align:left;border-bottom:1px solid var(--border);background:var(--muted)}
td{font-size:.72rem;padding:.7rem .9rem;border-bottom:1px solid rgba(28,28,28,.5);color:var(--dim);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .5rem;border:1px solid}
.badge-pending{color:var(--yellow);border-color:rgba(250,204,21,.3);background:rgba(250,204,21,.06)}
.badge-approved{color:var(--green);border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.06)}
.badge-rejected{color:var(--red);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.06)}
/* BUTTONS */
.btn-approve,.btn-reject{font-family:inherit;font-size:.62rem;letter-spacing:.08em;padding:.28rem .7rem;border:1px solid;cursor:pointer;transition:background .2s;margin-right:.4rem}
.btn-approve{color:var(--green);border-color:rgba(74,222,128,.4);background:transparent}
.btn-approve:hover{background:rgba(74,222,128,.12)}
.btn-reject{color:var(--red);border-color:rgba(248,113,113,.4);background:transparent}
.btn-reject:hover{background:rgba(248,113,113,.1)}
/* ACCESS DENIED */
#denied{display:none;min-height:calc(100vh - 48px);align-items:center;justify-content:center;text-align:center;padding:2rem}
#denied.show{display:flex;flex-direction:column;gap:.8rem}
.denied-icon{font-size:2.5rem}
.denied-title{font-size:1rem;font-weight:700;color:var(--red)}
.denied-sub{font-size:.75rem;color:var(--dim)}
#app{display:none}
#app.show{display:block}
/* LOADING */
#loading{min-height:calc(100vh - 48px);display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--dim);letter-spacing:.1em}
.empty{text-align:center;padding:2rem;color:var(--fmuted);font-size:.72rem}
</style>
</head>
<body>

<nav>
  <span class="nav-brand">⚠ STEGO ADMIN</span>
  <div class="nav-r">
    <span class="nav-user" id="nav-user"></span>
    <button class="nav-out" id="btn-out">Sign Out</button>
  </div>
</nav>

<div id="loading">Authenticating…</div>

<div id="denied">
  <div class="denied-icon">🚫</div>
  <div class="denied-title">Access Denied</div>
  <div class="denied-sub">This panel is restricted to the site administrator.</div>
  <a href="/" style="font-size:.7rem;color:var(--red);margin-top:.5rem">← Back to Portfolio</a>
</div>

<div id="app">
<main>
  <h1>// Admin Panel — Stego Payload Injector</h1>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-pending">—</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n" id="s-approved">—</div><div class="stat-l">Approved</div></div>
    <div class="stat"><div class="stat-n" id="s-rejected">—</div><div class="stat-l">Rejected</div></div>
  </div>

  <!-- PENDING REQUESTS -->
  <div class="sec-label">// Stego Access Requests</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Reason</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="users-tbody"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>

</main>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import{getFirestore,collection,getDocs,doc,updateDoc,query,getCountFromServer,where}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

// ⚠ Set your email here
const ADMIN_EMAIL='satapathys198@gmail.com';

const FB={apiKey:"AIzaSyAvwVd19ucMaKp_WsYDSVU0hzu5asHhS1k",authDomain:"sambit-portfolio.firebaseapp.com",projectId:"sambit-portfolio",storageBucket:"sambit-portfolio.firebasestorage.app",messagingSenderId:"98909249081",appId:"1:98909249081:web:00bdbda2f0ed56a2c177e8"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

function badge(s){return`<span class="badge badge-${s}">${s}</span>`}

async function loadStats(){
  try{
    const pQ=query(collection(db,'users'),where('stego_status','==','pending'));
    const aQ=query(collection(db,'users'),where('stego_status','==','approved'));
    const rQ=query(collection(db,'users'),where('stego_status','==','rejected'));
    const [p,a,r]=await Promise.all([getCountFromServer(pQ),getCountFromServer(aQ),getCountFromServer(rQ)]);
    document.getElementById('s-pending').textContent=p.data().count;
    document.getElementById('s-approved').textContent=a.data().count;
    document.getElementById('s-rejected').textContent=r.data().count;
  }catch(e){console.error(e)}
}

async function loadUsers(){
  const tbody=document.getElementById('users-tbody');
  try{
    // Filter for users who actually have a stego_status
    const snap=await getDocs(query(collection(db,'users'), where('stego_status', '!=', '')));
    if(snap.empty){tbody.innerHTML='<tr><td colspan="5" class="empty">No requests yet.</td></tr>';return;}
    tbody.innerHTML='';
    snap.forEach(d=>{
      const u=d.data();
      const tr=document.createElement('tr');
      tr.innerHTML=`<td style="color:var(--fg)">${u.displayName||'—'}</td><td>${u.email||'—'}</td><td style="max-width:200px;word-break:break-word">${u.stego_reason||'—'}</td><td>${badge(u.stego_status||'unknown')}</td><td><button class="btn-approve" data-uid="${d.id}">Approve</button><button class="btn-reject" data-uid="${d.id}">Reject</button></td>`;
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll('.btn-approve').forEach(b=>b.onclick=async()=>{
      await updateDoc(doc(db,'users',b.dataset.uid),{stego_status:'approved'});
      b.textContent='✓';b.disabled=true;loadUsers();loadStats();
    });
    tbody.querySelectorAll('.btn-reject').forEach(b=>b.onclick=async()=>{
      await updateDoc(doc(db,'users',b.dataset.uid),{stego_status:'rejected'});
      b.textContent='✗';b.disabled=true;loadUsers();loadStats();
    });
  }catch(e){tbody.innerHTML=`<tr><td colspan="5" class="empty">Error: ${e.message}</td></tr>`}
}

onAuthStateChanged(auth,user=>{
  document.getElementById('loading').style.display='none';
  if(!user){window.location.href='/login/?redirect='+encodeURIComponent('/stego-payload/admin/');return;}
  document.getElementById('nav-user').textContent=user.email||'';
  document.getElementById('btn-out').onclick=()=>signOut(auth).then(()=>window.location.href='/');
  if(user.email!==ADMIN_EMAIL){document.getElementById('denied').classList.add('show');return;}
  document.getElementById('app').classList.add('show');
  loadStats();loadUsers();
});
</script>
</body>
</html>
