<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sambit.page</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020408;
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor-dot {
    position: fixed;
    width: 8px; height: 8px;
    background: #00f5ff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px #00f5ff, 0 0 30px #00f5ff, 0 0 60px rgba(0,245,255,0.4);
    transition: transform 0.05s;
    mix-blend-mode: screen;
  }

  .cursor-ring {
    position: fixed;
    width: 40px; height: 40px;
    border: 1px solid rgba(0,245,255,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, border-color 0.3s;
  }

  .cursor-trail {
    position: fixed;
    width: 4px; height: 4px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9997;
    transform: translate(-50%, -50%);
    background: #00f5ff;
    mix-blend-mode: screen;
  }

  /* Canvas for everything */
  #bgCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* Scanlines */
  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 5;
    animation: scanMove 8s linear infinite;
  }

  @keyframes scanMove {
    0% { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(2,4,8,0.8) 100%);
    pointer-events: none;
    z-index: 4;
  }

  /* Main content */
  .container {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  .domain {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(0.9rem, 3.5vw, 1.2rem);
    color: #00f5ff;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 64px;
    opacity: 0;
    animation: riseIn 1s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
    position: relative;
  }

  .domain::before, .domain::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, #00f5ff);
    box-shadow: 0 0 8px #00f5ff;
  }
  .domain::before { right: calc(100% + 16px); }
  .domain::after { left: calc(100% + 16px); transform: rotate(180deg); }

  /* Glitch text effect */
  .glitch-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .main-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(1.1rem, 3.5vw, 1.5rem);
    color: #c8e6f0;
    line-height: 2.4;
    opacity: 0;
    animation: riseIn 1s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .main-text .hi { color: #fff; font-size: 1.2em; }
  .name-span {
    color: #00f5ff;
    text-shadow: 0 0 20px #00f5ff, 0 0 40px rgba(0,245,255,0.4);
    display: inline-block;
    animation: nameGlitch 6s 2s infinite;
    font-size: 1.3em;
  }

  @keyframes nameGlitch {
    0%, 90%, 100% {
      text-shadow: 0 0 20px #00f5ff, 0 0 40px rgba(0,245,255,0.4);
      transform: translate(0);
      filter: none;
    }
    91% {
      text-shadow: -3px 0 #ff006e, 3px 0 #00f5ff;
      transform: translate(-2px, 1px);
      filter: blur(0.5px);
    }
    92% {
      text-shadow: 3px 0 #ff006e, -3px 0 #00f5ff;
      transform: translate(2px, -1px);
    }
    93% {
      text-shadow: 0 0 20px #00f5ff, 0 0 40px rgba(0,245,255,0.4);
      transform: translate(0);
      filter: none;
    }
    95% {
      text-shadow: -2px 0 #bf5fff, 2px 0 #00f5ff;
      transform: translate(1px, 0);
    }
    96% {
      text-shadow: 0 0 20px #00f5ff;
      transform: translate(0);
    }
  }

  .wait-line {
    color: #7ab8c8;
    font-size: 0.95em;
  }

  .something-span {
    color: #ff006e;
    text-shadow: 0 0 15px #ff006e, 0 0 30px rgba(255,0,110,0.3);
    display: inline-block;
    position: relative;
    animation: pinkPulse 3s 2s infinite;
  }

  @keyframes pinkPulse {
    0%, 100% { text-shadow: 0 0 15px #ff006e, 0 0 30px rgba(255,0,110,0.3); }
    50% { text-shadow: 0 0 25px #ff006e, 0 0 60px rgba(255,0,110,0.5), 0 0 100px rgba(255,0,110,0.2); }
  }

  .blink-cursor {
    display: inline-block;
    width: 3px; height: 1.1em;
    background: #00f5ff;
    vertical-align: middle;
    margin-left: 6px;
    box-shadow: 0 0 8px #00f5ff;
    animation: blink 0.75s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 49%{opacity:1} 50%{opacity:0} }

  /* Bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 24px;
    opacity: 0;
    animation: riseIn 1s 1.2s ease forwards;
  }

  .bar-line {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,245,255,0.4));
  }
  .bar-line:last-child { transform: rotate(180deg); }

  .status-text {
    font-size: 0.6rem;
    letter-spacing: 4px;
    color: #2a6070;
    text-transform: uppercase;
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    z-index: 10;
    width: 30px; height: 30px;
    opacity: 0;
    animation: riseIn 1s 1s ease forwards;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 24px; left: 24px; }
  .corner-tr { top: 24px; right: 24px; transform: rotate(90deg); }
  .corner-bl { bottom: 24px; left: 24px; transform: rotate(-90deg); }
  .corner-br { bottom: 24px; right: 24px; transform: rotate(180deg); }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Mouse ripple */
  .ripple {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 6;
    border: 1px solid rgba(0,245,255,0.6);
    transform: translate(-50%, -50%) scale(0);
    animation: rippleOut 0.8s ease-out forwards;
  }

  @keyframes rippleOut {
    to { transform: translate(-50%, -50%) scale(4); opacity: 0; }
  }

  /* Click burst */
  .burst {
    position: fixed;
    pointer-events: none;
    z-index: 7;
    transform: translate(-50%, -50%);
  }

  .burst-particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #00f5ff;
    animation: burstFly 0.6s ease-out forwards;
  }

  @keyframes burstFly {
    to { transform: translate(var(--tx), var(--ty)); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Cursor elements -->
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Background canvas -->
<canvas id="bgCanvas"></canvas>

<!-- Overlays -->
<div class="vignette"></div>
<div class="scanlines"></div>

<!-- Corner decorations -->
<div class="corner corner-tl">
  <svg viewBox="0 0 30 30" fill="none">
    <path d="M0 30 L0 0 L30 0" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
    <path d="M0 20 L0 0 L20 0" stroke="#00f5ff" stroke-width="0.5" opacity="0.3"/>
  </svg>
</div>
<div class="corner corner-tr">
  <svg viewBox="0 0 30 30" fill="none">
    <path d="M0 30 L0 0 L30 0" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  </svg>
</div>
<div class="corner corner-bl">
  <svg viewBox="0 0 30 30" fill="none">
    <path d="M0 30 L0 0 L30 0" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  </svg>
</div>
<div class="corner corner-br">
  <svg viewBox="0 0 30 30" fill="none">
    <path d="M0 30 L0 0 L30 0" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  </svg>
</div>

<!-- Main -->
<div class="container">
  <div class="domain">SAMBIT.PAGE</div>

  <div class="main-text">
    <div><span class="hi">Hey</span> — this is <span class="name-span" id="nameSpan">Sambit</span>.</div>
    <div>I'll do <span class="something-span" id="somethingSpan">something</span> here.</div>
    <div>Don't know what,</div>
    <div>but <em>something</em>.<span class="blink-cursor"></span></div>
  </div>
</div>

<!-- Bottom -->
<div class="bottom-bar">
  <div class="bar-line"></div>
  <div class="status-text">// coming soon — watch this space</div>
  <div class="bar-line"></div>
</div>

<script>
// ─── CANVAS SETUP ───────────────────────────────────────
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, mouse = { x: -1000, y: -1000 };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── PARTICLES ──────────────────────────────────────────
const PARTICLE_COUNT = 120;
const particles = [];

class Particle {
  constructor() { this.reset(true); }
  reset(initial) {
    this.x = Math.random() * W;
    this.y = initial ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -(0.3 + Math.random() * 0.7);
    this.size = Math.random() > 0.8 ? 2 : 1;
    this.color = Math.random() > 0.75 ? '#ff006e' : '#00f5ff';
    this.alpha = 0;
    this.maxAlpha = 0.2 + Math.random() * 0.4;
    this.life = 0;
    this.maxLife = 150 + Math.random() * 200;
  }
  update() {
    this.life++;
    const t = this.life / this.maxLife;
    this.alpha = t < 0.1 ? t * 10 * this.maxAlpha
               : t > 0.8 ? (1 - (t - 0.8) / 0.2) * this.maxAlpha
               : this.maxAlpha;

    // Mouse repulsion
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 120) {
      const force = (120 - dist) / 120 * 0.8;
      this.vx += (dx / dist) * force * 0.15;
      this.vy += (dy / dist) * force * 0.15;
    }

    this.vx *= 0.98;
    this.vy *= 0.98;
    this.x += this.vx;
    this.y += this.vy;

    if (this.life >= this.maxLife || this.y < -10) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

// ─── GRID ───────────────────────────────────────────────
function drawGrid() {
  const spacing = 50;
  ctx.strokeStyle = 'rgba(0,245,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

// ─── MOUSE GLOW ─────────────────────────────────────────
function drawMouseGlow() {
  const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 200);
  grad.addColorStop(0, 'rgba(0,245,255,0.06)');
  grad.addColorStop(0.5, 'rgba(0,245,255,0.02)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 200, 0, Math.PI * 2);
  ctx.fill();
}

// ─── CONSTELLATION LINES ────────────────────────────────
function drawLines() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 80) {
        ctx.save();
        ctx.globalAlpha = (1 - dist / 80) * 0.08;
        ctx.strokeStyle = '#00f5ff';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
        ctx.restore();
      }
    }
  }
}

// ─── SCAN LINE ──────────────────────────────────────────
let scanY = 0;
function drawScanBeam() {
  scanY = (scanY + 1.5) % H;
  const grad = ctx.createLinearGradient(0, scanY - 60, 0, scanY + 4);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(0.8, 'rgba(0,245,255,0.025)');
  grad.addColorStop(1, 'rgba(0,245,255,0.06)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, scanY - 60, W, 64);
}

// ─── MAIN LOOP ──────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawGrid();
  drawMouseGlow();
  drawScanBeam();
  drawLines();
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(loop);
}
loop();

// ─── CURSOR ─────────────────────────────────────────────
const dot = document.getElementById('cursorDot');
const ring = document.getElementById('cursorRing');
let rx = 0, ry = 0;
const trails = [];

for (let i = 0; i < 8; i++) {
  const t = document.createElement('div');
  t.className = 'cursor-trail';
  t.style.opacity = (1 - i / 8) * 0.4;
  t.style.width = t.style.height = (4 - i * 0.3) + 'px';
  document.body.appendChild(t);
  trails.push({ el: t, x: 0, y: 0 });
}

document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  dot.style.left = mouse.x + 'px';
  dot.style.top = mouse.y + 'px';
});

function animateCursor() {
  rx += (mouse.x - rx) * 0.12;
  ry += (mouse.y - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';

  // Trail
  trails[0].x += (mouse.x - trails[0].x) * 0.35;
  trails[0].y += (mouse.y - trails[0].y) * 0.35;
  for (let i = 1; i < trails.length; i++) {
    trails[i].x += (trails[i-1].x - trails[i].x) * 0.45;
    trails[i].y += (trails[i-1].y - trails[i].y) * 0.45;
  }
  trails.forEach(t => {
    t.el.style.left = t.x + 'px';
    t.el.style.top = t.y + 'px';
  });

  requestAnimationFrame(animateCursor);
}
animateCursor();

// ─── CLICK BURST ────────────────────────────────────────
document.addEventListener('click', e => {
  // Ripple
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px';
  r.style.top = e.clientY + 'px';
  r.style.width = r.style.height = '40px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 800);

  // Burst particles
  const burst = document.createElement('div');
  burst.className = 'burst';
  burst.style.left = e.clientX + 'px';
  burst.style.top = e.clientY + 'px';
  document.body.appendChild(burst);

  const colors = ['#00f5ff', '#ff006e', '#bf5fff', '#39ff14'];
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'burst-particle';
    const angle = (i / 16) * Math.PI * 2;
    const dist = 30 + Math.random() * 40;
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.boxShadow = `0 0 6px ${p.style.background}`;
    burst.appendChild(p);
  }
  setTimeout(() => burst.remove(), 700);
});

// ─── TEXT HOVER REACTIONS ───────────────────────────────
document.getElementById('nameSpan').addEventListener('mouseenter', () => {
  ring.style.width = '80px';
  ring.style.height = '80px';
  ring.style.borderColor = '#00f5ff';
});
document.getElementById('nameSpan').addEventListener('mouseleave', () => {
  ring.style.width = '40px';
  ring.style.height = '40px';
  ring.style.borderColor = 'rgba(0,245,255,0.5)';
});

document.getElementById('somethingSpan').addEventListener('mouseenter', () => {
  ring.style.width = '80px';
  ring.style.height = '80px';
  ring.style.borderColor = '#ff006e';
});
document.getElementById('somethingSpan').addEventListener('mouseleave', () => {
  ring.style.width = '40px';
  ring.style.height = '40px';
  ring.style.borderColor = 'rgba(0,245,255,0.5)';
});

// ─── KEYBOARD EASTER EGG ────────────────────────────────
let typed = '';
document.addEventListener('keydown', e => {
  typed += e.key.toLowerCase();
  if (typed.includes('sambit')) {
    typed = '';
    // Big glitch flash
    document.body.style.filter = 'hue-rotate(180deg) brightness(1.5)';
    setTimeout(() => document.body.style.filter = '', 150);
    // Spawn 50 particles from center
    for (let i = 0; i < 50; i++) {
      setTimeout(() => {
        const p = new Particle();
        p.x = W / 2 + (Math.random() - 0.5) * 100;
        p.y = H / 2 + (Math.random() - 0.5) * 100;
        p.vy = -(1 + Math.random() * 2);
        p.vx = (Math.random() - 0.5) * 2;
        particles.push(p);
        if (particles.length > PARTICLE_COUNT + 60) particles.shift();
      }, i * 20);
    }
  }
  if (typed.length > 20) typed = typed.slice(-20);
});

// ─── IDLE GLITCH ────────────────────────────────────────
setInterval(() => {
  const nameEl = document.getElementById('nameSpan');
  nameEl.style.filter = 'blur(1px) brightness(2)';
  nameEl.style.transform = `translate(${(Math.random()-0.5)*4}px, ${(Math.random()-0.5)*2}px)`;
  setTimeout(() => {
    nameEl.style.filter = '';
    nameEl.style.transform = '';
  }, 80);
}, 4000 + Math.random() * 3000);
</script>
</body>
</html>
